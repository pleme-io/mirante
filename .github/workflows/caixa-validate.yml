name: caixa-validate

# Non-publishing CI gate: cse-lint repo --strict (CSE invariants) + feira lint.
# Complements auto-release.yml (it does not publish). Reusable workflow:
# pleme-io/substrate/.github/workflows/caixa-validate.yml

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    uses: pleme-io/substrate/.github/workflows/caixa-validate.yml@main
    secrets: inherit
    permissions:
      contents: read
