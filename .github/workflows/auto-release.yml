name: auto-release

# Three-line consumer shim. Every push to main runs the pleme-io substrate
# Rust-workspace auto-release pipeline (bump workspace version → commit →
# tag → push → publish each member to crates.io in dep order, multi-pass,
# auto-rename on name conflict, idempotent-skip already-published).
# Reusable workflow: pleme-io/substrate/.github/workflows/rust-auto-release.yml

# Shared concurrency group with gen-spec: the two must never push to main
# concurrently, or the bump's rebase-onto-latest conflicts on the
# gen-spec-regenerated Cargo.gen.lock and `git push --atomic` fails. Same
# group key in both workflows serializes them.
concurrency:
  group: mirante-mainline-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump-type:
        description: "patch | minor | major"
        required: false
        default: patch

jobs:
  release:
    uses: pleme-io/substrate/.github/workflows/rust-auto-release.yml@main
    with:
      bump-type: ${{ inputs.bump-type || 'patch' }}
    secrets: inherit
